name: clima
description: A new Flutter application.

version: 1.0.0+1

environment:
  sdk: ^3.12.1
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.3
  http: ^1.6.0
  font_awesome_flutter: ^11.0.0
  flutter_dialogs: ^3.0.0
  flutter_dotenv: ^6.0.1
  lottie: ^3.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - .env
    - lottie/

  fonts:
  - family: Spartan MB
    fonts:
    - asset: fonts/SpartanMB-Black.otf
      weight: 900